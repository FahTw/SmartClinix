services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus; rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - mdd-network

  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mdd-network

  patient-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
    ports:
      - "5434:5432"
    volumes:
      - patient_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient_user -d patient_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mdd-network

  medical-records-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: medical_records_db
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_pass
    ports:
      - "5435:5432"
    volumes:
      - medical_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_records_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mdd-network

  appointment-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: appointment_pass
    ports:
      - "5436:5432"
    volumes:
      - appointment_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointment_user -d appointment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mdd-network

  auth-service:
    build:
      context: ./internal/auth
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=auth-db
      - DB_PORT=5432
      - DB_USER=auth_user
      - DB_PASSWORD=auth_pass
      - DB_NAME=auth_db
      - DB_SSLMODE=disable
      - SSL_MODE=disable
      - JWT_SECRET=my-default-jwt-secret-key
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - mdd-network
    restart: unless-stopped

  patient-service:
    build:
      context: ./internal/patient
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=patient-db
      - DB_PORT=5432
      - DB_USER=patient_user
      - DB_PASSWORD=patient_pass
      - DB_NAME=patient_db
      - DB_SSLMODE=disable
      - SERVER_PORT=8080
    depends_on:
      patient-db:
        condition: service_healthy
    networks:
      - mdd-network
    restart: unless-stopped

  medical-records-service:
    build:
      context: ./internal/medical_records
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=medical-records-db
      - DB_PORT=5432
      - DB_USER=medical_user
      - DB_PASSWORD=medical_pass
      - DB_NAME=medical_records_db
      - DB_SSLMODE=disable
      - SERVER_PORT=8081
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      medical-records-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - mdd-network
    restart: unless-stopped

  appointment-service:
    build:
      context: ./internal/appointment
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=appointment-db
      - DB_PORT=5432
      - DB_USER=appointment_user
      - DB_PASSWORD=appointment_pass
      - DB_NAME=appointment_db
      - DB_SSLMODE=disable
      - SERVER_PORT=8083
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      appointment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - mdd-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mdd-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - mdd-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
    privileged: true
    networks:
      - mdd-network
    restart: unless-stopped

networks:
  mdd-network:
    driver: bridge

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  auth_pgdata:
  patient_pgdata:
  medical_pgdata:
  appointment_pgdata: